<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Mintly">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E8B5C"/>
      <stop offset="55%" stop-color="#1F5C3A"/>
      <stop offset="100%" stop-color="#163E27"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners — OS applies mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Safe zone is inner 80% (centered 410x410). Logo scaled down to ~58% of canvas -->
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <circle cx="256" cy="256" r="168" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="120,348 120,196 200,290 256,222 312,290 392,164"/>
      <polyline points="346,164 392,164 392,210"/>
    </g>
    <circle cx="392" cy="164" r="13" fill="#7CE0A8"/>
  </g>
</svg>
