<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Mintly">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E8B5C"/>
      <stop offset="55%" stop-color="#1F5C3A"/>
      <stop offset="100%" stop-color="#163E27"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect width="512" height="512" rx="118" ry="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" ry="118" fill="url(#sheen)"/>

  <!-- Subtle inner ring (depth) -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Line-art mark: stylized "M" as ascending chart peaks + dot accent -->
  <g fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mountain / "M" silhouette built from a single ascending polyline -->
    <polyline points="120,348 120,196 200,290 256,222 312,290 392,164"/>
    <!-- Trailing trend arrow head -->
    <polyline points="346,164 392,164 392,210"/>
  </g>

  <!-- Endpoint dot (mint accent) -->
  <circle cx="392" cy="164" r="13" fill="#7CE0A8"/>
</svg>
