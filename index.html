<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance AI Pro</title>
<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
button { background:#22c55e; color:#000; cursor:pointer; }
.card { background:#1e293b; padding:15px; border-radius:12px; margin-top:15px; }
</style>
</head>
<body>

<h2>💰 Clasificador Inteligente</h2>

<input id="desc" placeholder="Descripción (ej: ADEUDO BasicFit)" />
<input id="amount" placeholder="Cantidad" />
<button onclick="add()">Añadir movimiento</button>

<div id="list"></div>

<script>
// ---------------- NORMALIZE ----------------
function normalize(text) {
  return text.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
}

// ---------------- STORAGE ----------------
let learned = JSON.parse(localStorage.getItem("learned") || "{}")
let aiCache = JSON.parse(localStorage.getItem("aiCache") || "{}")
let movements = JSON.parse(localStorage.getItem("movements") || "[]")

// ---------------- LEARN ----------------
function learn(text, category) {
  const words = normalize(text).split(" ")
  words.forEach(w => {
    if (w.length > 3) learned[w] = category
  })
  localStorage.setItem("learned", JSON.stringify(learned))
}

// ---------------- KEYWORDS ----------------
const CATEGORY_KEYWORDS = {
  ocio: ["cine","cinesa","netflix"],
  deporte: ["gym","basicfit","fitness"],
  gasolina: ["repsol","cepsa","plenergy"],
  seguros: ["seguro","insurance","bbva"],
  hogar: ["agua","luz","electricidad"],
  comida: ["restaurant","bar","cafe","burger"]
}

// ---------------- FUZZY ----------------
function similarity(a,b){
  let longer=a.length>b.length?a:b
  let shorter=a.length>b.length?b:a
  return (longer.length-editDistance(longer,shorter))/longer.length
}
function editDistance(a,b){
  const m=[]
  for(let i=0;i<=b.length;i++)m[i]=[i]
  for(let j=0;j<=a.length;j++)m[0][j]=j
  for(let i=1;i<=b.length;i++){
    for(let j=1;j<=a.length;j++){
      m[i][j]=b[i-1]==a[j-1]?m[i-1][j-1]:Math.min(
        m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1)
    }
  }
  return m[b.length][a.length]
}
function fuzzyMatch(text){
  const words=normalize(text).split(" ")
  for(let cat in CATEGORY_KEYWORDS){
    for(let k of CATEGORY_KEYWORDS[cat]){
      for(let w of words){
        if(similarity(w,k)>0.7) return cat
      }
    }
  }
  return null
}

// ---------------- AI ----------------
async function classifyWithAI(text){
  if(aiCache[text]) return aiCache[text]

  try{
    const res=await fetch("/.netlify/functions/classify",{
      method:"POST",
      body:JSON.stringify({text})
    })
    const data=await res.json()
    aiCache[text]=data.category
    localStorage.setItem("aiCache",JSON.stringify(aiCache))
    return data.category
  }catch(e){
    return "otros"
  }
}

// ---------------- BRAIN ----------------
async function smartCategorize(text){
  const t=normalize(text)

  for(let w of t.split(" ")){
    if(learned[w]) return learned[w]
  }

  for(let cat in CATEGORY_KEYWORDS){
    for(let k of CATEGORY_KEYWORDS[cat]){
      if(t.includes(k)) return cat
    }
  }

  const f=fuzzyMatch(t)
  if(f) return f

  const ai=await classifyWithAI(text)
  learn(text,ai)
  return ai
}

// ---------------- APP ----------------
async function add(){
  const desc=document.getElementById("desc").value
  const amount=document.getElementById("amount").value

  const category=await smartCategorize(desc)

  const m={desc,amount,category}
  movements.push(m)
  localStorage.setItem("movements",JSON.stringify(movements))

  render()
}

function render(){
  const list=document.getElementById("list")
  list.innerHTML=""

  movements.forEach((m,i)=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerHTML=`
      <b>${m.desc}</b><br>
      ${m.amount} €<br>
      Categoría: ${m.category}<br>
      <button onclick="fix(${i})">Corregir</button>
    `
    list.appendChild(div)
  })
}

function fix(i){
  const newCat=prompt("Nueva categoría:")
  if(!newCat) return
  learn(movements[i].desc,newCat)
  movements[i].category=newCat
  localStorage.setItem("movements",JSON.stringify(movements))
  render()
}

render()
</script>

</body>
</html>
