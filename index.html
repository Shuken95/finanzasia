<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#CC785C"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="FinanzasIA"/>
  <title>FinanzasIA</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      /* Claude warm palette */
      --cl-bg:        #F5F0E8;
      --cl-surface:   #FDFAF4;
      --cl-surface2:  #F0EAD8;
      --cl-border:    #DDD5C2;
      --cl-border2:   #C8BFAA;
      --cl-orange:    #CC785C;
      --cl-orange2:   #B8644A;
      --cl-orange-bg: rgba(204,120,92,.1);
      --cl-text:      #2C2417;
      --cl-text2:     #5A4E3C;
      --cl-muted:     #8A7A65;
      --cl-muted2:    #B0A38C;
      /* semantic */
      --green:        #2E7D52;
      --green-bg:     rgba(46,125,82,.1);
      --red:          #C0392B;
      --red-bg:       rgba(192,57,43,.1);
      --blue:         #2471A3;
      --blue-bg:      rgba(36,113,163,.1);
      --purple:       #6C3483;
      --purple-bg:    rgba(108,52,131,.1);
      --safe-top:     env(safe-area-inset-top,0px);
      --safe-bottom:  env(safe-area-inset-bottom,0px);
      --radius:       14px;
      --shadow:       0 2px 12px rgba(44,36,23,.08);
      --shadow-md:    0 4px 24px rgba(44,36,23,.12);
    }

    html,body{
      height:100%;
      background:var(--cl-bg);
      color:var(--cl-text);
      font-family:'Sora',sans-serif;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    /* ── LAYOUT ── */
    #app{display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto}

    /* ── HEADER ── */
    .header{
      background:var(--cl-surface);
      border-bottom:1px solid var(--cl-border);
      padding:calc(var(--safe-top) + 14px) 20px 0;
      flex-shrink:0;
      box-shadow:var(--shadow);
      position:relative;
      z-index:10;
    }
    .header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .logo{
      width:42px;height:42px;
      background:linear-gradient(135deg,var(--cl-orange),#D4895A);
      border-radius:13px;
      display:flex;align-items:center;justify-content:center;font-size:20px;
      box-shadow:0 3px 14px rgba(204,120,92,.3);
      flex-shrink:0;
    }
    .logo-title{font-weight:800;font-size:18px;color:var(--cl-text);letter-spacing:-.4px}
    .logo-sub{font-size:11px;color:var(--cl-muted);margin-top:1px}

    /* ── TABS ── */
    .tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{
      background:transparent;color:var(--cl-muted);border:none;
      border-bottom:2px solid transparent;
      padding:9px 14px 10px;
      font-weight:700;font-size:12px;cursor:pointer;
      white-space:nowrap;font-family:inherit;
      transition:all .2s;flex-shrink:0;letter-spacing:.3px;
    }
    .tab-btn.active{color:var(--cl-orange);border-bottom-color:var(--cl-orange)}
    .tab-btn:hover:not(.active){color:var(--cl-text2)}

    /* ── CONTENT ── */
    .content{
      flex:1;overflow-y:auto;
      padding:20px 16px calc(var(--safe-bottom)+28px);
      display:flex;flex-direction:column;gap:14px;
      background:var(--cl-bg);
    }
    .content::-webkit-scrollbar{width:4px}
    .content::-webkit-scrollbar-thumb{background:var(--cl-border2);border-radius:2px}

    /* ── CARDS ── */
    .card{
      background:var(--cl-surface);
      border:1px solid var(--cl-border);
      border-radius:var(--radius);
      padding:18px 20px;
      box-shadow:var(--shadow);
    }
    .card-title{font-weight:700;font-size:14px;margin-bottom:14px;color:var(--cl-text);letter-spacing:.1px}
    .card-orange{border-color:rgba(204,120,92,.3);background:linear-gradient(135deg,var(--cl-surface) 60%,rgba(204,120,92,.04))}

    /* ── STAT CARDS ── */
    .stats-row{display:flex;gap:10px;flex-wrap:wrap}
    .stat-card{
      background:var(--cl-surface);border:1px solid var(--cl-border);
      border-radius:var(--radius);padding:14px 16px;flex:1;min-width:95px;
      box-shadow:var(--shadow);
    }
    .stat-label{color:var(--cl-muted);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:600}
    .stat-value{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;line-height:1}
    .stat-sub{color:var(--cl-muted2);font-size:10px;margin-top:5px}

    /* ── ACCOUNT CARDS ── */
    .accounts-row{display:flex;gap:10px}
    .account-card{flex:1;border-radius:var(--radius);padding:16px;border:1px solid;box-shadow:var(--shadow)}
    .account-card.bbva{background:linear-gradient(135deg,#EBF4FD,#DDEEF9);border-color:#AACDE8}
    .account-card.revolut{background:linear-gradient(135deg,#EEEAF8,#E5DFFA);border-color:#B8ADE8}
    .acct-name{font-weight:800;font-size:11px;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
    .acct-name.bbva{color:var(--blue)}
    .acct-name.revolut{color:var(--purple)}
    .acct-balance{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;color:var(--cl-text)}
    .acct-sub{color:var(--cl-muted);font-size:11px;margin-top:4px;line-height:1.5}

    /* ── FORMS ── */
    .form-group{display:flex;flex-direction:column;gap:9px}
    .form-row{display:flex;gap:8px}
    input,select{
      background:var(--cl-bg);border:1.5px solid var(--cl-border);
      border-radius:10px;color:var(--cl-text);
      padding:10px 13px;font-size:13px;font-family:inherit;
      width:100%;outline:none;-webkit-appearance:none;appearance:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus,select:focus{border-color:var(--cl-orange);box-shadow:0 0 0 3px rgba(204,120,92,.15)}
    input::placeholder{color:var(--cl-muted2)}
    select option{background:var(--cl-surface)}
    input[type=date]{color-scheme:light}

    /* ── BUTTONS ── */
    .btn{
      background:var(--cl-orange);color:#fff;border:none;
      border-radius:10px;padding:11px 20px;font-weight:700;font-size:13px;
      cursor:pointer;font-family:inherit;white-space:nowrap;
      transition:background .15s,transform .1s,box-shadow .15s;
      -webkit-tap-highlight-color:transparent;
      box-shadow:0 2px 10px rgba(204,120,92,.3);
    }
    .btn:hover{background:var(--cl-orange2);box-shadow:0 4px 16px rgba(204,120,92,.4)}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
    .btn-ghost{background:var(--cl-surface2);color:var(--cl-text2);box-shadow:none;border:1px solid var(--cl-border)}
    .btn-ghost:hover{background:var(--cl-border);color:var(--cl-text)}
    .btn-full{width:100%;text-align:center}
    .btn-sm{padding:7px 13px;font-size:12px}
    .btn-outline{background:transparent;color:var(--cl-orange);border:1.5px solid var(--cl-orange);box-shadow:none}
    .btn-outline:hover{background:var(--cl-orange-bg)}
    .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.25);box-shadow:none}
    .btn-danger:hover{background:rgba(192,57,43,.18)}

    /* ── PROGRESS ── */
    .prog-track{background:var(--cl-surface2);border-radius:6px;height:7px;overflow:hidden;margin-top:8px}
    .prog-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}

    /* ── MOVEMENT ITEMS ── */
    .mov-item{
      background:var(--cl-surface);border:1px solid var(--cl-border);
      border-radius:12px;padding:12px 14px;
      display:flex;align-items:center;gap:11px;
      box-shadow:var(--shadow);
      animation:slideIn .2s ease;
    }
    @keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
    .mov-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .mov-info{flex:1;min-width:0}
    .mov-desc{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--cl-text)}
    .mov-meta{color:var(--cl-muted);font-size:11px;margin-top:2px;display:flex;gap:5px;align-items:center}
    .mov-amount{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;flex-shrink:0}
    .del-btn{background:none;border:none;color:var(--cl-muted2);cursor:pointer;font-size:15px;padding:4px;flex-shrink:0;transition:color .15s;line-height:1}
    .del-btn:hover{color:var(--red)}
    .src-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}

    /* ── TAGS ── */
    .tag{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;border:1px solid}

    /* ── FILTER CHIPS ── */
    .filter-row{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
    .filter-row::-webkit-scrollbar{display:none}
    .chip{
      background:var(--cl-surface);border:1px solid var(--cl-border);
      color:var(--cl-muted);border-radius:100px;padding:6px 14px;
      font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
      font-family:inherit;transition:all .15s;
    }
    .chip.active{background:var(--cl-orange-bg);border-color:rgba(204,120,92,.4);color:var(--cl-orange)}

    /* ── IMPORT / DROP ZONE ── */
    .drop-zone{
      border:2px dashed var(--cl-border2);border-radius:var(--radius);
      padding:28px 20px;text-align:center;cursor:pointer;
      transition:all .25s;position:relative;
      background:var(--cl-surface2);
    }
    .drop-zone:hover,.drop-zone.over{border-color:var(--cl-orange);background:var(--cl-orange-bg)}
    .drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .dz-icon{font-size:32px;margin-bottom:10px}
    .dz-title{font-weight:700;font-size:14px;color:var(--cl-text);margin-bottom:5px}
    .dz-sub{color:var(--cl-muted);font-size:12px;line-height:1.6}
    .import-tip{
      background:var(--cl-surface2);border:1px solid var(--cl-border);
      border-radius:10px;padding:12px 14px;
      font-size:12px;color:var(--cl-muted);line-height:1.7;margin-bottom:12px;
    }
    .import-tip strong{color:var(--cl-text2)}

    /* ── DEBT / SAVING CARDS ── */
    .sub-card{background:var(--cl-surface);border:1px solid var(--cl-border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
    .sub-name{font-weight:700;font-size:15px;color:var(--cl-text);margin-bottom:3px}
    .sub-detail{color:var(--cl-muted);font-size:12px;line-height:1.5}

    /* ── ANALYSIS ── */
    .score-card{
      background:linear-gradient(135deg,var(--cl-surface),var(--cl-orange-bg));
      border:1px solid rgba(204,120,92,.25);
      border-radius:var(--radius);padding:28px 20px;text-align:center;
      box-shadow:var(--shadow-md);
    }
    .score-num{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;line-height:1}
    .score-desc{font-size:13px;color:var(--cl-text2);margin-top:12px;line-height:1.7;max-width:320px;margin-left:auto;margin-right:auto}
    .score-bar-wrap{max-width:240px;margin:16px auto 0}
    .score-track{background:var(--cl-surface2);border-radius:8px;height:10px;overflow:hidden}
    .score-fill{height:100%;border-radius:8px;transition:width .6s ease}
    .score-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--cl-muted);margin-top:5px;font-weight:600;letter-spacing:.5px}

    .a-section{background:var(--cl-surface);border:1px solid var(--cl-border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
    .a-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .a-item{display:flex;gap:10px;font-size:13px;line-height:1.65;color:var(--cl-text2);margin-bottom:8px}
    .a-item:last-child{margin-bottom:0}
    .a-icon{flex-shrink:0;font-size:15px;margin-top:1px}
    .plan-step{display:flex;gap:12px;align-items:flex-start;padding:12px;background:var(--cl-surface2);border-radius:10px;margin-bottom:8px}
    .plan-step:last-child{margin-bottom:0}
    .step-num{width:26px;height:26px;border-radius:8px;background:var(--cl-orange);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace}
    .step-body{flex:1}
    .step-title{font-weight:700;font-size:13px;color:var(--cl-text);margin-bottom:3px}
    .step-detail{font-size:12px;color:var(--cl-muted);line-height:1.6}

    /* ── TOTAL BAR ── */
    .total-bar{background:var(--cl-surface2);border:1px solid var(--cl-border);border-radius:var(--radius);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .total-label{color:var(--cl-muted);font-size:13px}
    .total-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px}

    /* ── CAT ROW ── */
    .cat-row{margin-bottom:13px}
    .cat-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
    .cat-name{font-weight:600;color:var(--cl-text2)}
    .cat-pct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cl-orange);font-weight:700}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:32px 20px;color:var(--cl-muted)}
    .empty-icon{font-size:36px;margin-bottom:10px}
    .empty-text{font-size:13px;line-height:1.6}

    /* ── DIVIDER ── */
    .divider{height:1px;background:var(--cl-border);margin:6px 0}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:calc(var(--safe-bottom)+24px);left:50%;
      transform:translateX(-50%) translateY(90px);
      background:var(--cl-text);color:#fff;
      padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index:1000;pointer-events:none;box-shadow:var(--shadow-md);
    }
    #toast.show{transform:translateX(-50%) translateY(0)}

    /* ── SPINNER ── */
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── INSTALL ── */
    #install-bar{display:none;background:var(--cl-orange-bg);border:1px solid rgba(204,120,92,.3);border-radius:10px;padding:12px 16px;align-items:center;gap:10px;margin:0 16px}
    #install-bar.show{display:flex}
    .install-text{flex:1;font-size:13px;color:var(--cl-orange);font-weight:600}

    /* ── SECTION BADGE ── */
    .badge{display:inline-block;background:var(--cl-orange);color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
  </style>
</head>
<body>

<div id="install-bar">
  <span class="install-text">📲 Instalar FinanzasIA como app</span>
  <button class="btn btn-sm" id="install-btn">Instalar</button>
  <button class="btn-ghost btn btn-sm" id="dismiss-install">✕</button>
</div>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">💰</div>
      <div>
        <div class="logo-title">FinanzasIA</div>
        <div class="logo-sub">BBVA · Revolut · Gestión inteligente</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const TABS = ['Resumen','Importar CSV','Movimientos','Presupuesto','Ahorros','Deudas','Análisis IA'];

const CATEGORIES = {
  'Alimentación':'🛒','Transporte':'🚗','Vivienda':'🏠','Salud':'💊','Ocio':'🎬',
  'Ropa':'👔','Educación':'📚','Tecnología':'💻','Restaurantes':'🍽️','Viajes':'✈️',
  'Ahorro':'💰','Nómina':'💼','Freelance':'🔧','Inversión':'📈','Préstamo':'🏦',
  'Hipoteca':'🏡','Suscripciones':'📱','Transferencia':'↔️','Otro':'📦'
};

const SOURCES = {
  bbva:   { label:'BBVA',    dot:'#2471A3', bg:'#EBF4FD' },
  revolut:{ label:'Revolut', dot:'#6C3483', bg:'#EEEAF8' },
  manual: { label:'Manual',  dot:'#8A7A65', bg:'#F0EAD8' }
};

const PRIO_COLOR = { alta:'var(--red)', media:'var(--cl-orange)', baja:'var(--green)' };

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let S = loadState() || {
  tab: 'Resumen',
  filter: 'all',
  quickAdvice: '',
  analysis: null,
  analysisLoading: false,
  analysisError: '',
  realBalance: { bbva: null, revolut: null },
  movements: [
    {id:'m1',desc:'Nómina mayo',       amount:2800,type:'income', category:'Nómina',       date:'2026-05-01',source:'bbva'},
    {id:'m2',desc:'Hipoteca',          amount:720, type:'expense',category:'Hipoteca',      date:'2026-05-02',source:'bbva'},
    {id:'m3',desc:'Préstamo coche',    amount:280, type:'expense',category:'Préstamo',      date:'2026-05-02',source:'bbva'},
    {id:'m4',desc:'Transferencia a Revolut',amount:900,type:'expense',category:'Transferencia',date:'2026-05-03',source:'bbva'},
    {id:'m5',desc:'Recarga Revolut',   amount:900, type:'income', category:'Transferencia', date:'2026-05-03',source:'revolut'},
    {id:'m6',desc:'Préstamo personal', amount:180, type:'expense',category:'Préstamo',      date:'2026-05-04',source:'revolut'},
    {id:'m7',desc:'Mercadona',         amount:95,  type:'expense',category:'Alimentación',  date:'2026-05-04',source:'revolut'},
    {id:'m8',desc:'Gasolina BP',       amount:58,  type:'expense',category:'Transporte',    date:'2026-05-05',source:'bbva'},
    {id:'m9',desc:'Netflix + Spotify', amount:22,  type:'expense',category:'Suscripciones', date:'2026-05-06',source:'revolut'},
    {id:'m10',desc:'Restaurante',      amount:46,  type:'expense',category:'Restaurantes',  date:'2026-05-07',source:'revolut'},
  ],
  budgets: {'Alimentación':250,'Transporte':120,'Ocio':80,'Restaurantes':100,'Suscripciones':40},
  savings: [
    {id:'s1',name:'Fondo emergencia',target:5000,current:1800,color:'#2E7D52'},
    {id:'s2',name:'Vacaciones',       target:1500,current:350, color:'#2471A3'},
  ],
  debts: [
    {id:'d1',name:'Hipoteca',                 total:120000,remaining:98000,monthly:720,color:'#CC785C',source:'bbva'},
    {id:'d2',name:'Préstamo coche',           total:10000, remaining:6200, monthly:280,color:'#2471A3',source:'bbva'},
    {id:'d3',name:'Préstamo Revolut',         total:3000,  remaining:1650, monthly:180,color:'#6C3483',source:'revolut'},
  ],
};

function saveState(){ try{localStorage.setItem('finanzas_v3',JSON.stringify(S))}catch(e){} }
function loadState(){ try{const s=localStorage.getItem('finanzas_v3');return s?JSON.parse(s):null}catch(e){return null} }

const fmt  = n => new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const uid  = () => Math.random().toString(36).slice(2,9);
const now  = () => new Date().toISOString().slice(0,10);

// ══════════════════════════════════════════════════
// COMPUTED STATS
// ══════════════════════════════════════════════════
function isInterAccount(m){
  // Exclude transfers between own BBVA <-> Revolut accounts from real totals
  const d = m.desc.toLowerCase();
  if(m.source==='bbva'){
    // Transfers received from Revolut (user sending money back to BBVA)
    if(d.includes('enviada desde revolut')) return true;
    // Transfers sent to Revolut
    if(d.includes('transferencia realizada') && d.includes('revo')) return true;
  }
  if(m.source==='revolut'){
    // ALL Recargas = top-ups from own BBVA (always internal)
    if(m.tipo==='Recargas') return true;
    // Transferencia category = internal
    if(m.category==='Transferencia') return true;
  }
  return false;
}

function computed(){
  const bySrc = { bbva:{in:0,out:0}, revolut:{in:0,out:0} };
  const byCat = {};
  let totalIn=0, totalOut=0;
  for(const m of S.movements){
    if(isInterAccount(m)) continue; // skip internal transfers between own accounts
    if(m.type==='income'){
      totalIn+=m.amount;
      if(bySrc[m.source]) bySrc[m.source].in+=m.amount;
    } else {
      totalOut+=m.amount;
      if(bySrc[m.source]) bySrc[m.source].out+=m.amount;
      if(m.category!=='Transferencia') byCat[m.category]=(byCat[m.category]||0)+m.amount;
    }
  }
  const realOut = Object.values(byCat).reduce((a,b)=>a+b,0);
  return {totalIn, totalOut, realOut, balance:totalIn-totalOut, bySrc, byCat};
}

// CLAUDE API
// ══════════════════════════════════════════════════
async function claude(prompt, max=800){
  try {
    const r = await fetch('/api/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({max_tokens:max, messages:[{role:'user',content:prompt}]})
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    return d.content?.[0]?.text?.trim()||'';
  } catch(e) {
    console.error('Claude API error:', e);
    throw e;
  }
}

async function aiCategory(desc){
  try{
    const cats=Object.keys(CATEGORIES).join(', ');
    const r=await claude(`Clasifica en UNA categoría: ${cats}.\nTexto: "${desc}"\nResponde SOLO el nombre exacto de la categoría.`,40);
    return CATEGORIES[r]?r:'Otro';
  }catch{return 'Otro'}
}

async function aiBatchCategories(items){
  // items: [{id, desc}]
  if(!items.length) return {};
  const cats=Object.keys(CATEGORIES).join(', ');
  const lines=items.map((x,i)=>`${i+1}. ${x.desc}`).join('\n');
  try{
    const r=await claude(
      `Clasifica estos movimientos bancarios. Categorías: ${cats}.\n${lines}\nResponde SOLO líneas con formato "N. Categoría" (número, punto, espacio, nombre exacto).`,
      600
    );
    const map={};
    for(const line of r.split('\n')){
      const m=line.match(/^(\d+)\.\s+(.+)$/);
      if(m){const idx=parseInt(m[1])-1;const cat=m[2].trim();if(items[idx]&&CATEGORIES[cat]) map[items[idx].id]=cat;}
    }
    return map;
  }catch{return {}}
}

// CSV PARSERS
// ══════════════════════════════════════════════════
function parseBBVA(text){
  // BBVA CSV: ,Fecha valor,Fecha,Concepto,Movimiento,Importe,Divisa,Disponible,...
  // First rows are metadata - skip until header found
  const rows=[];
  const lines=text.split(/\r?\n/);
  let headerFound=false;
  let realBalance=null; // read from 'Disponible' column of FIRST data row
  for(const line of lines){
    const trimmed=line.trim();
    if(!trimmed) continue;
    if(!headerFound){
      if(trimmed.toLowerCase().includes('fecha valor')||trimmed.toLowerCase().includes('concepto')){
        headerFound=true;
      }
      continue;
    }
    const cols=parseCSVLine(line);
    if(cols.length<6) continue;
    const rawDate=(cols[1]||'').trim();
    const concepto=(cols[3]||'').trim().slice(0,60);
    const movimiento=(cols[4]||'').trim().slice(0,60);
    const desc=(concepto&&movimiento&&movimiento!==concepto)
      ?`${concepto} - ${movimiento}`:(concepto||movimiento);
    const rawAmt=(cols[5]||'').trim();
    const amt=parseFloat(rawAmt);
    if(isNaN(amt)||!desc) continue;
    // Read real balance from 'Disponible' column (col 7) of the FIRST row only
    // BBVA lists most recent first, so first row = current balance
    if(realBalance===null){
      const bal=parseFloat((cols[7]||'').trim());
      if(!isNaN(bal)) realBalance=bal;
    }
    let date=now();
    if(rawDate.match(/^\d{2}\/\d{2}\/\d{4}$/)){
      const p=rawDate.split('/'); date=`${p[2]}-${p[1]}-${p[0]}`;
    } else if(rawDate.match(/^\d{4}-\d{2}-\d{2}$/)){
      date=rawDate;
    } else continue;
    rows.push({id:uid(),desc,amount:Math.abs(amt),type:amt>=0?'income':'expense',category:'Otro',date,source:'bbva'});
  }
  return {rows, realBalance};
}

function parseCSVLine(line){
  const cols=[];
  let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQ=!inQ; continue; }
    if(c===','&&!inQ){ cols.push(cur.trim()); cur=''; continue; }
    cur+=c;
  }
  cols.push(cur.trim());
  return cols;
}

function parseRevolut(text){
  // Revolut ES CSV: Tipo,Producto,Fecha inicio,Fecha fin,Descripcion,Importe,Comision,Divisa,State,Saldo
  const SKIP_STATES=new Set(['DEVUELTO','FALLIDO','CADUCADO','REVERTIDO']);
  const rows=[];
  let realBalance=null;
  const lines=text.split('\n');
  let skipFirst=true;
  for(const line of lines){
    if(skipFirst){skipFirst=false;continue;}
    if(!line.trim()) continue;
    const cols=parseCSVLine(line);
    if(cols.length<6) continue;
    const tipo   = cols[0];
    const desc   = (cols[4]||'').slice(0,80);
    const rawDate= (cols[2]||'').split(' ')[0];
    const rawAmt = cols[5];
    const state  = (cols[8]||'').trim();
    const amt=parseFloat(rawAmt.replace(',','.'));
    if(isNaN(amt)||!desc) continue;
    if(SKIP_STATES.has(state)) continue;
    const dl=desc.toLowerCase();
    if(tipo==='Transferir'&&(dl.includes('pocket')||dl.includes('ahorros'))) continue;
    // First valid row = most recent = real current balance (col 9)
    if(realBalance===null){
      const bal=parseFloat((cols[9]||'').trim());
      if(!isNaN(bal)) realBalance=bal;
    }
    let date=now();
    if(rawDate.match(/\d{4}-\d{2}-\d{2}/)) date=rawDate;
    rows.push({id:uid(),desc,amount:Math.abs(amt),type:amt>=0?'income':'expense',category:'Otro',date,source:'revolut',tipo});
  }
  return {rows, realBalance};
}



async function handleImport(file, source){
  const text=await file.text();
  const result = source==='bbva' ? parseBBVA(text) : parseRevolut(text);
  let parsed = result.rows;
  if(!parsed.length){ toast('⚠️ No se encontraron movimientos'); return; }

  // Store real balance from CSV if available
  if(result.realBalance!==null){
    S.realBalance[source]=result.realBalance;
  }

  toast(`⏳ Clasificando ${parsed.length} movimientos con IA...`);

  // Batch AI categorization
  const cats = await aiBatchCategories(parsed.map(m=>({id:m.id,desc:m.desc})));
  parsed = parsed.map(m=>({...m, category: cats[m.id]||'Otro'}));

  // On first real import, wipe demo movements (those with no real source data)
  const hasRealData = S.movements.some(m=>m.source==='bbva'||m.source==='revolut');
  if(!hasRealData) S.movements = [];

  // Deduplicate by desc+date+amount
  const existing = new Set(S.movements.map(m=>`${m.desc}|${m.date}|${m.amount}`));
  const newOnes = parsed.filter(m=>!existing.has(`${m.desc}|${m.date}|${m.amount}`));

  S.movements = [...newOnes, ...S.movements];
  S.analysis = null;
  render();
  toast(`✅ ${newOnes.length} movimientos de ${SOURCES[source].label} importados`);
}

          <div class="sub-detail">${fmt(s.current)} de ${fmt(s.target)} · ${done?'¡Meta alcanzada! 🎉':'Faltan '+fmt(s.target-s.current)}</div>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;color:${s.color}">${Math.round(pct)}%</span>
      </div>
      <div class="prog-track" style="height:10px;border-radius:8px">
        <div class="prog-fill" style="width:${pct}%;background:${s.color};border-radius:8px"></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <input id="add-s-${s.id}" type="number" placeholder="Añadir €" inputmode="decimal"/>
        <button class="btn btn-sm" style="background:${s.color};box-shadow:none" onclick="addSaving('${s.id}')">+ Añadir</button>
        <button class="del-btn" style="padding:8px" onclick="delSaving('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('')}

  <div class="total-bar">
    <span class="total-label">Total ahorrado</span>
    <span class="total-value" style="color:var(--green)">${fmt(total)} <span style="font-size:13px;color:var(--cl-muted)">/ ${fmt(target)}</span></span>
  </div>`;
}

// ── DEUDAS ─────────────────────────────────────────
function rDeudas(){
  const totRem=S.debts.reduce((s,d)=>s+d.remaining,0);
  const totMon=S.debts.reduce((s,d)=>s+d.monthly,0);
  const {totalIn}=computed();
  const ratio=totalIn>0?Math.round((totMon/totalIn)*100):0;
  const ratioColor=ratio>40?'var(--red)':ratio>25?'var(--cl-orange)':'var(--green)';

  return `
  <div class="card">
    <div class="card-title">💳 Añadir deuda</div>
    <div class="form-group">
      <input id="d-name" placeholder="Nombre (ej: Préstamo coche)"/>
      <div class="form-row">
        <input id="d-total"     type="number" placeholder="Total €"    inputmode="decimal"/>
        <input id="d-remaining" type="number" placeholder="Pendiente €" inputmode="decimal"/>
        <input id="d-monthly"   type="number" placeholder="Cuota €/mes" inputmode="decimal"/>
      </div>
      <button class="btn btn-full" id="add-debt-btn">Añadir deuda</button>
    </div>
  </div>

  ${S.debts.map(d=>{
    const paid=d.total-d.remaining, pct=Math.round((paid/d.total)*100);
    const months=d.monthly>0?Math.ceil(d.remaining/d.monthly):null;
    return `
    <div class="sub-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div class="sub-name">${d.name}</div>
          <div class="sub-detail">Pendiente: ${fmt(d.remaining)} de ${fmt(d.total)}${months?` · ~${months} meses`:''}</div>
          ${d.source?`<div style="margin-top:4px"><span class="tag" style="font-size:10px;color:${SOURCES[d.source]?.dot};border-color:${SOURCES[d.source]?.dot}44;background:${SOURCES[d.source]?.bg}">${SOURCES[d.source]?.label}</span></div>`:''}
        </div>
        <span class="tag" style="color:${d.color};border-color:${d.color}44;background:${d.color}18">${pct}% pagado</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" style="width:${pct}%;background:${d.color}"></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <button class="btn" style="flex:1;background:${d.color};box-shadow:none" onclick="payDebt('${d.id}')" ${d.monthly<=0?'disabled':''}>
          💸 Pagar ${fmt(d.monthly)}
        </button>
        <button class="del-btn" style="padding:8px" onclick="delDebt('${d.id}')">✕</button>
      </div>
    </div>`;
  }).join('')}

  <div class="total-bar" style="background:var(--red-bg);border-color:rgba(192,57,43,.2)">
    <div>
      <div class="total-label">Deuda total pendiente</div>
      <div style="font-size:11px;color:var(--cl-muted);margin-top:2px">Cuotas: ${fmt(totMon)}/mes · <span style="color:${ratioColor};font-weight:700">${ratio}% de ingresos</span></div>
    </div>
    <div class="total-value" style="color:var(--red)">${fmt(totRem)}</div>
  </div>`;
}

// ── ANÁLISIS IA ────────────────────────────────────
function rAnalysis(){
  const a=S.analysis;
  if(!a){
    if(S.analysisLoading) return `
      <div class="card card-orange" style="text-align:center;padding:48px 24px">
        <div style="font-size:48px;margin-bottom:16px">🧠</div>
        <div style="font-weight:700;font-size:16px;color:var(--cl-text);margin-bottom:8px">Analizando tu situación...</div>
        <div style="color:var(--cl-muted);font-size:13px;margin-bottom:24px">Esto puede tardar unos segundos</div>
        <div style="display:flex;justify-content:center">
          <div style="width:36px;height:36px;border:3px solid var(--cl-border2);border-top-color:var(--cl-orange);border-radius:50%;animation:rot .8s linear infinite"></div>
        </div>
      </div>`;
    return `
      <div class="card card-orange" style="text-align:center;padding:40px 24px">
        <div style="font-size:50px;margin-bottom:16px">🧠</div>
        <div style="font-weight:800;font-size:18px;color:var(--cl-text);margin-bottom:10px">Análisis financiero completo</div>
        <div style="color:var(--cl-muted);font-size:13px;line-height:1.8;margin-bottom:24px">
          La IA revisará tu situación con BBVA y Revolut:<br/>
          puntuación de salud financiera, fortalezas,<br/>
          áreas de mejora y un plan de acción paso a paso<br/>
          teniendo en cuenta hipoteca, préstamos y ahorros.
        </div>
        ${S.analysisError?`<div style="background:var(--red-bg);border:1px solid rgba(192,57,43,.25);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--red)">${S.analysisError}</div>`:''}
        <button class="btn" id="run-analysis-btn" style="margin:0 auto">✨ Generar análisis completo</button>
      </div>`;
  }

  const scoreColor={green:'var(--green)',orange:'var(--cl-orange)',red:'var(--red)'}[a.color]||'var(--cl-orange)';

  return `
  <div class="score-card">
    <div style="color:var(--cl-muted);font-size:11px;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;font-weight:700">Salud financiera</div>
    <div class="score-num" style="color:${scoreColor}">${a.puntuacion}</div>
    <div style="color:var(--cl-muted);font-size:12px;margin-top:2px">puntos de 100</div>
    <div class="score-bar-wrap">
      <div class="score-track">
        <div class="score-fill" style="width:${a.puntuacion}%;background:${scoreColor}"></div>
      </div>
      <div class="score-labels"><span>Crítico</span><span>Óptimo</span></div>
    </div>
    <div class="score-desc">${a.resumen}</div>
  </div>

  <div class="a-section">
    <div class="a-section-title" style="color:var(--green)">✅ Puntos fuertes</div>
    ${(a.puntos_fuertes||[]).map(p=>`<div class="a-item"><span class="a-icon">✓</span><span>${p}</span></div>`).join('')}
  </div>

  <div class="a-section">
    <div class="a-section-title" style="color:var(--red)">⚠️ Áreas de mejora</div>
    ${(a.areas_mejora||[]).map(p=>`<div class="a-item"><span class="a-icon">→</span><span>${p}</span></div>`).join('')}
  </div>

  <div class="a-section">
    <div class="a-section-title" style="color:var(--cl-orange)">🗺 Plan de acción</div>
    ${(a.plan||[]).map((s,i)=>`
      <div class="plan-step">
        <div class="step-num">${i+1}</div>
        <div class="step-body">
          <div class="step-title">
            ${s.titulo}
            <span class="tag" style="font-size:10px;margin-left:4px;color:${PRIO_COLOR[s.prioridad]||'var(--cl-muted)'};border-color:${PRIO_COLOR[s.prioridad]||'var(--cl-muted)'}33;background:${PRIO_COLOR[s.prioridad]||'var(--cl-muted)'}11">${s.prioridad}</span>
          </div>
          <div class="step-detail">${s.detalle}</div>
        </div>
      </div>`).join('')}
  </div>

  <div class="a-section" style="border-color:rgba(204,120,92,.25);background:linear-gradient(135deg,var(--cl-surface),rgba(204,120,92,.04))">
    <div class="a-section-title" style="color:var(--cl-orange)">🏦 Estrategia de deudas</div>
    <div style="font-size:13px;line-height:1.75;color:var(--cl-text2)">${a.estrategia_deuda||''}</div>
    ${a.ahorro_recomendado_mes?`
    <div style="margin-top:14px;padding:12px 14px;background:var(--green-bg);border-radius:10px;border:1px solid rgba(46,125,82,.2)">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--green);font-weight:700;margin-bottom:4px">Ahorro mensual recomendado</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--green)">${fmt(a.ahorro_recomendado_mes)}<span style="font-size:14px;color:var(--cl-muted)">/mes</span></div>
    </div>`:''}
  </div>

  <button class="btn btn-outline btn-full" id="run-analysis-btn">🔄 Regenerar análisis</button>`;
}

// ══════════════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════════════
function bindEvents(){
  // Quick advice
  const qa=document.getElementById('qa-btn');
  if(qa) qa.onclick=async()=>{
    qa.innerHTML='<span class="spin"></span>Analizando...'; qa.disabled=true;
    const c=computed();
    const debtMonthly=S.debts.reduce((s,d)=>s+d.monthly,0);
    const debtTotal=S.debts.reduce((s,d)=>s+d.remaining,0);
    const topExpenses=Object.entries(c.byCat).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}: ${fmt(v)}`).join(', ');
    const savingsTotal=S.savings.reduce((s,v)=>s+v.current,0);
    const bbvaBalance=S.realBalance.bbva!==null?S.realBalance.bbva:(c.bySrc.bbva.in-c.bySrc.bbva.out);
    const revBalance=S.realBalance.revolut!==null?S.realBalance.revolut:(c.bySrc.revolut.in-c.bySrc.revolut.out);
    const prompt=`Eres un asesor financiero personal. Analiza esta situación financiera real y da exactamente 3 consejos MUY concretos y accionables en español. Cada consejo debe estar basado en los datos reales, no ser genérico.

DATOS FINANCIEROS REALES:
- Ingresos del período: ${fmt(c.totalIn)}
- Gastos reales del período: ${fmt(c.realOut)}
- Balance del período: ${fmt(c.totalIn - c.realOut)}
- Saldo actual BBVA: ${fmt(bbvaBalance)}
- Saldo actual Revolut: ${fmt(revBalance)}
- Cuotas de deuda mensuales: ${fmt(debtMonthly)}/mes (${c.totalIn>0?Math.round((debtMonthly/c.totalIn)*100):0}% de ingresos)
- Deuda total pendiente: ${fmt(debtTotal)}
- Ahorros acumulados: ${fmt(savingsTotal)}
- Top gastos: ${topExpenses||'sin datos'}
- Número de movimientos analizados: ${S.movements.length}

Formato de respuesta: exactamente 3 líneas, cada una empezando con un emoji relevante, luego el consejo concreto con cifras reales. Sin introducciones ni conclusiones.`;
    try{
      S.quickAdvice=await claude(prompt, 300);
    }catch(e){
      S.quickAdvice='⚠️ No se pudo conectar con la IA. Asegúrate de haber configurado la API key en Netlify (ver instrucciones en la pestaña Importar CSV).';
    }
    render();
  };

  // Full analysis
  const ra=document.getElementById('run-analysis-btn');
  if(ra) ra.onclick=async()=>{
    S.analysisLoading=true; S.analysisError=''; S.analysis=null;
    render(); // show spinner
    try{
      const result=await runAnalysis();
      if(!result) throw new Error('La IA devolvió una respuesta vacía');
      S.analysis=result; S.analysisLoading=false;
    } catch(e){
      console.error('Analysis error:', e);
      S.analysisLoading=false;
      S.analysisError=`Error: ${e.message}. Comprueba que la API key está configurada en Netlify → Site configuration → Environment variables → ANTHROPIC_API_KEY`;
    }
    render();
  };

  // Add movement
  const am=document.getElementById('add-mov-btn');
  if(am) am.onclick=async()=>{
    const desc=document.getElementById('m-desc').value.trim();
    const amount=parseFloat(document.getElementById('m-amt').value);
    const type=document.getElementById('m-type').value;
    const source=document.getElementById('m-src').value;
    const cat=document.getElementById('m-cat').value;
    const date=document.getElementById('m-date').value;
    if(!desc||!amount) return toast('⚠️ Rellena descripción e importe');
    am.innerHTML='<span class="spin"></span>'; am.disabled=true;
    const category=cat||await aiCategory(desc);
    S.movements.unshift({id:uid(),desc,amount,type,category,date:date||now(),source});
    S.analysis=null;
    toast(`✅ Añadido · ${category} · ${SOURCES[source].label}`);
    render();
  };

  // Budget
  const sb=document.getElementById('save-budget-btn');
  if(sb) sb.onclick=()=>{
    const cat=document.getElementById('b-cat').value;
    const amt=parseFloat(document.getElementById('b-amt').value);
    if(!amt) return toast('⚠️ Introduce un importe');
    S.budgets[cat]=amt; toast('✅ Presupuesto guardado'); render();
  };

  // Saving
  const as=document.getElementById('add-saving-btn');
  if(as) as.onclick=()=>{
    const name=document.getElementById('s-name').value.trim();
    const target=parseFloat(document.getElementById('s-target').value);
    const current=parseFloat(document.getElementById('s-current').value)||0;
    if(!name||!target) return toast('⚠️ Rellena nombre y objetivo');
    const palette=['#2E7D52','#2471A3','#CC785C','#6C3483','#B7950B'];
    S.savings.push({id:uid(),name,target,current,color:palette[S.savings.length%palette.length]});
    toast('✅ Meta creada'); render();
  };

  // Debt
  const ad=document.getElementById('add-debt-btn');
  if(ad) ad.onclick=()=>{
    const name=document.getElementById('d-name').value.trim();
    const total=parseFloat(document.getElementById('d-total').value);
    const remaining=parseFloat(document.getElementById('d-remaining').value)||total;
    const monthly=parseFloat(document.getElementById('d-monthly').value)||0;
    if(!name||!total) return toast('⚠️ Rellena nombre y total');
    const palette=['#CC785C','#2471A3','#6C3483','#2E7D52'];
    S.debts.push({id:uid(),name,total,remaining,monthly,color:palette[S.debts.length%palette.length],source:'manual'});
    toast('✅ Deuda añadida'); render();
  };

  // CSV file inputs
  bindDropZone('dz-bbva','file-bbva','bbva');
  bindDropZone('dz-revolut','file-revolut','revolut');
}

function bindDropZone(dzId, fileId, source){
  const dz=document.getElementById(dzId);
  const fi=document.getElementById(fileId);
  if(!dz||!fi) return;
  fi.onchange=e=>{if(e.target.files[0]) handleImport(e.target.files[0],source);};
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('over');
    const f=e.dataTransfer.files[0];
    if(f) handleImport(f,source);
  });
}

// ══════════════════════════════════════════════════
// GLOBAL ACTIONS
// ══════════════════════════════════════════════════
window.setFilter  = f=>{S.filter=f;render()};
window.delMov     = id=>{S.movements=S.movements.filter(m=>m.id!==id);S.analysis=null;render()};
window.delBudget  = cat=>{delete S.budgets[cat];render()};
window.delSaving  = id=>{S.savings=S.savings.filter(s=>s.id!==id);render()};
window.delDebt    = id=>{S.debts=S.debts.filter(d=>d.id!==id);S.analysis=null;render()};
window.addSaving  = id=>{
  const v=parseFloat(document.getElementById('add-s-'+id)?.value);
  if(!v) return;
  S.savings=S.savings.map(s=>s.id===id?{...s,current:Math.min(s.current+v,s.target)}:s);
  render();
};
window.payDebt    = id=>{
  S.debts=S.debts.map(d=>d.id===id?{...d,remaining:Math.max(d.remaining-d.monthly,0)}:d);
  toast('💸 Cuota pagada'); render();
};
window.resetMovements = ()=>{
  if(!confirm('¿Borrar todos los movimientos? Esta acción no se puede deshacer.')) return;
  S.movements=[]; S.analysis=null; render(); toast('🗑 Movimientos eliminados');
};

// ══════════════════════════════════════════════════
// PWA
// ══════════════════════════════════════════════════
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-bar').classList.add('show');
  document.getElementById('install-btn').onclick=async()=>{
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    if(outcome==='accepted') toast('✅ ¡App instalada!');
    deferredPrompt=null;
    document.getElementById('install-bar').classList.remove('show');
  };
  document.getElementById('dismiss-install').onclick=()=>
    document.getElementById('install-bar').classList.remove('show');
});
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
render();
</script>
</body>
</html>
