[build]
  publish = "."
  functions = "netlify/functions"

# El proxy del endpoint Claude (Anthropic) sigue funcionando como antes.
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# ── Cache headers ────────────────────────────────────
# El service worker y el manifest NUNCA deben quedarse en caché del CDN /
# del navegador: si lo hacen, los usuarios se quedan en la versión vieja
# indefinidamente.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# index.html tampoco se cachea: Netlify siempre sirve la última versión.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Los iconos sí los cacheamos un año: cambian con el nombre del archivo
# si decides versionarlos (icon-192-v2.png, etc.).
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
